name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    env:
      PORT: 3000
      TT_ADMIN_EMAIL: admin@talentthread.local
      TT_ADMIN_PASSWORD: ${{ secrets.TT_ADMIN_PASSWORD }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_REVIEW_MODEL: gpt-5.4
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate secrets and env wiring
        run: |
          node - <<'NODE'
          const assert = require('node:assert/strict');
          const { isAiReviewConfigured } = require('./lib/ai-review');

          assert.ok(process.env.OPENAI_API_KEY, 'OPENAI_API_KEY is required');
          assert.ok(process.env.TT_ADMIN_PASSWORD, 'TT_ADMIN_PASSWORD is required');
          assert.equal(process.env.TT_ADMIN_EMAIL, 'admin@talentthread.local');
          assert.equal(process.env.OPENAI_REVIEW_MODEL, 'gpt-5.4');
          assert.equal(isAiReviewConfigured(), true);
          console.log('Environment variables are wired correctly.');
          NODE

      - name: Syntax check server entrypoint
        run: node --check server.js

      - name: Syntax check AI helper
        run: node --check lib/ai-review.js