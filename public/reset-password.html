<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talent Thread | Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/auth.css" />
  </head>
  <body class="auth-page">
    <div class="auth-layout">
      <div class="auth-visual-panel">
        <a class="auth-logo-link" href="/">
          <img src="/assets/logos/tt-logo-white.png" alt="Talent Thread" class="auth-logo-img" onerror="this.src='/assets/logos/tt-logo.png'; this.style.filter='invert(1)'" />
        </a>
        <div class="auth-visual-content">
          <h2 class="auth-visual-headline">Reset your password securely.</h2>
          <p class="auth-visual-sub">Choose a new password with at least 8 characters and one special character.</p>
        </div>
      </div>
      <div class="auth-form-panel">
        <div class="auth-form-inner">
          <div class="auth-form-header">
            <h1>Set a new password</h1>
            <p id="resetMessage">Enter your new password to continue.</p>
          </div>
          <form id="resetPasswordForm" class="auth-form" novalidate>
            <div class="auth-field">
              <label for="resetPassword">New Password</label>
              <input id="resetPassword" name="password" type="password" autocomplete="new-password" required />
            </div>
            <button class="button auth-btn-primary" id="resetPasswordButton" type="submit">Update Password →</button>
          </form>
          <div class="auth-divider">
            <span>Back to access</span>
          </div>
          <a class="button auth-btn-outline" href="/login.html">Return to login →</a>
        </div>
      </div>
    </div>
    <script src="/js/shared.js"></script>
    <script src="/js/reset-password.js"></script>
  </body>
</html>
