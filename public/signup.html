<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Join Talent Thread — AI-verified design talent platform. Sign up as a designer or post projects as a client." />
  <title>Sign Up — Talent Thread</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/thread-ui.css" />
  <link rel="stylesheet" href="/css/auth-v2.css" />
</head>
<body>
  <div class="auth-page-wrap">
    <div class="auth-card-v2" style="max-width: 480px;">

      <a href="/" class="auth-brand">
        <div class="nav-monogram">TT</div>
        <span class="auth-wordmark">Thread</span>
      </a>

      <h1 class="auth-heading">Create your account</h1>
      <!-- sessionMessage: status shown by JS -->
      <p class="auth-subhead" id="sessionMessage">Join 500+ designers and companies on Talent Thread.</p>

      <!-- sessionActions: shown when already logged in -->
      <div id="sessionActions" class="hidden" style="display:flex; flex-direction:column; gap:10px; margin-bottom:16px;">
        <a href="/" id="primaryCta" class="btn btn-primary" style="justify-content:center;">Go to Dashboard</a>
        <button type="button" id="logoutButton" class="btn btn-secondary">Log Out</button>
      </div>

      <!-- Role toggle -->
      <div class="auth-role-toggle" id="roleToggle" style="margin-bottom: 16px;">
        <button class="auth-role-btn active" data-role="designer" type="button" id="roleDesignerBtn">
          <span class="auth-role-label">Designer</span>
          <span class="auth-role-desc">Build proof, get verified</span>
        </button>
        <button class="auth-role-btn" data-role="client" type="button" id="roleClientBtn">
          <span class="auth-role-label">Client / Company</span>
          <span class="auth-role-desc">Post projects, hire talent</span>
        </button>
      </div>

      <button type="button" id="googleSignupBtn" class="btn btn-secondary" style="width:100%; justify-content:center; margin-bottom: 24px;">
        <svg width="18" height="18" viewBox="0 0 24 24" style="margin-right: 8px;"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sign up with Google
      </button>

      <div class="auth-divider" style="margin-bottom: 24px;">
        <span>or sign up with email</span>
      </div>

      <form class="auth-form" id="signupForm" novalidate>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
          <div class="form-group">
            <label class="form-label" for="signupFirstName">First Name <span class="req">*</span></label>
            <input type="text" id="signupFirstName" name="firstName" class="form-input" placeholder="Sneha" required autocomplete="given-name" />
          </div>
          <div class="form-group">
            <label class="form-label" for="signupLastName">Last Name <span class="req">*</span></label>
            <input type="text" id="signupLastName" name="lastName" class="form-input" placeholder="Mehta" required autocomplete="family-name" />
          </div>
        </div>

        <!-- Combined name field for JS (hidden, auto-filled) -->
        <input type="hidden" id="signupName" name="name" />

        <div class="form-group">
          <label class="form-label" for="signupEmail">Email <span class="req">*</span></label>
          <input type="email" id="signupEmail" name="email" class="form-input" placeholder="you@example.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label class="form-label" for="signupPassword">Password <span class="req">*</span></label>
          <input type="password" id="signupPassword" name="password" class="form-input" placeholder="Minimum 8 characters" required autocomplete="new-password" />
        </div>

        <!-- Role hidden field -->
        <input type="hidden" id="signupRole" name="role" value="designer" />

        <!-- Designer-specific field -->
        <div class="form-group" id="portfolioGroup">
          <label class="form-label" for="signupPortfolio">Portfolio URL</label>
          <input type="url" id="signupPortfolio" name="portfolioUrl" class="form-input" placeholder="https://your-portfolio.com" autocomplete="off" />
        </div>

        <!-- Client-specific field -->
        <div class="form-group hidden" id="companyGroup">
          <label class="form-label" for="signupCompanyName">Company Name <span class="req">*</span></label>
          <input type="text" id="signupCompanyName" name="company" class="form-input" placeholder="Your Company" autocomplete="organization" />
        </div>

        <button type="submit" class="btn btn-primary" id="signupButton" style="width:100%; justify-content:center;">
          Create Account →
        </button>

        <p style="font-size:11px; color:var(--text-tertiary); text-align:center; line-height:1.5;">
          By signing up you agree to our <a href="#" style="color:var(--blue);">Terms of Service</a> and <a href="#" style="color:var(--blue);">Privacy Policy</a>.
        </p>
      </form>

      <div class="auth-footer-links" style="justify-content: center; margin-top: 16px;">
        <span>Already have an account? <a href="/login.html">Log in →</a></span>
      </div>
    </div>
  </div>

  <script src="/js/tt-utils.js"></script>
  <script type="module" src="/js/shared.js"></script>
  <script type="module" src="/js/signup.js"></script>
  <script>
    // Role toggle UI
    const roleBtns = document.querySelectorAll('#roleToggle .auth-role-btn');
    const roleInput = document.getElementById('signupRole');
    const portfolioGroup = document.getElementById('portfolioGroup');
    const companyGroup = document.getElementById('companyGroup');

    roleBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        roleBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const role = btn.dataset.role;
        roleInput.value = role;
        portfolioGroup.classList.toggle('hidden', role !== 'designer');
        companyGroup.classList.toggle('hidden', role !== 'client');
      });
    });

    // Auto combine first + last name into hidden name field before submit
    document.getElementById('signupForm').addEventListener('submit', function() {
      const first = document.getElementById('signupFirstName').value.trim();
      const last = document.getElementById('signupLastName').value.trim();
      document.getElementById('signupName').value = (first + ' ' + last).trim();
    }, true); // capture phase, runs before signup.js
  </script>
</body>
</html>
