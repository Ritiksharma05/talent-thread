<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Detail | Talent Thread</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --surface: #ffffff;
            --surface-2: #f8fafc;
            --surface-3: #f1f5f9;
            --ink: #0f172a;
            --ink-2: #334155;
            --ink-3: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
            --shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--surface-2); color: var(--ink); visibility: hidden; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        .navbar { background: white; height: 64px; display: flex; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        
        .main-grid { display: grid; grid-template-columns: 1fr 360px; gap: 40px; padding: 40px 0; }
        
        /* Job Content */
        .job-header { margin-bottom: 32px; }
        .discipline-badge { background: #eff6ff; color: var(--primary); padding: 4px 12px; border-radius: 99px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .job-title { font-size: 32px; font-weight: 800; margin: 16px 0 8px; }
        .job-meta-text { color: var(--ink-3); font-size: 14px; }

        .meta-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; background: white; padding: 24px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 40px; }
        .meta-item label { display: block; font-size: 10px; font-weight: 800; color: var(--ink-3); text-transform: uppercase; margin-bottom: 4px; }
        .meta-item span { font-weight: 700; color: var(--ink-2); font-size: 14px; }

        .description-box { line-height: 1.7; color: var(--ink-2); font-size: 16px; }
        .skills-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 24px; }
        .skill-chip { background: var(--surface-3); padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; }

        /* Sidebar Card */
        .sidebar-card { background: white; padding: 24px; border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow); position: sticky; top: 104px; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; border: none; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; margin-bottom: 12px; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--ink-2); }

        /* Drawer */
        .drawer-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); z-index: 1000; display: none; }
        .drawer { position: fixed; right: 0; top: 0; bottom: 0; width: 560px; background: white; z-index: 1001; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .drawer.active { transform: translateX(0); }
        .drawer-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .drawer-body { flex: 1; overflow-y: auto; padding: 24px; }
        .drawer-footer { padding: 24px; background: var(--surface-2); border-top: 1px solid var(--border); display: flex; gap: 12px; }

        /* AI Widget */
        .ai-widget { background: #eff6ff; border: 1px solid #dbeafe; padding: 20px; border-radius: 12px; margin-bottom: 24px; }
        .score-circle { width: 60px; height: 60px; border-radius: 50%; border: 4px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; }

        .hidden { display: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container"><span style="font-weight:900; color:var(--primary); font-size:24px">TT</span></div>
    </nav>

    <main class="container main-grid">
        <div class="content">
            <div id="jobHeader" class="job-header">
                <span class="discipline-badge" id="jobDiscipline">Loading...</span>
                <h1 class="job-title" id="jobTitle">---</h1>
                <div class="job-meta-text" id="jobSub">---</div>
            </div>

            <div class="meta-bar">
                <div class="meta-item"><label>Budget</label><span id="jobBudget">---</span></div>
                <div class="meta-item"><label>Timeline</label><span id="jobTimeline">---</span></div>
                <div class="meta-item"><label>Experience</label><span id="jobExp">---</span></div>
                <div class="meta-item"><label>Work Type</label><span id="jobType">---</span></div>
            </div>

            <div class="description-box">
                <h3 style="margin-bottom:16px">About the Project</h3>
                <div id="jobDesc">Loading job description...</div>
            </div>

            <div class="skills-grid" id="jobSkills"></div>
        </div>

        <div class="sidebar">
            <div class="sidebar-card">
                <button class="btn btn-primary" id="applyBtn">Apply Now</button>
                <button class="btn btn-outline" id="saveBtn">Save Job</button>
                
                <div style="margin-top:24px; padding-top:24px; border-top:1px solid var(--border)">
                    <div style="display:flex; align-items:center; gap:12px">
                        <div id="clientAvatar" style="width:40px; height:40px; border-radius:50%; background:var(--surface-3); display:flex; align-items:center; justify-content:center; font-weight:700">C</div>
                        <div>
                            <div style="font-weight:700; font-size:14px" id="clientName">Verified Client</div>
                            <div style="font-size:12px; color:var(--ink-3)">Member since 2024</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Apply Drawer -->
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="drawer" id="applyDrawer">
        <div class="drawer-header">
            <h3>Submit Proposal</h3>
            <button onclick="closeDrawer()" style="background:none; border:none; font-size:24px; cursor:pointer">×</button>
        </div>
        <div class="drawer-body">
            <div class="ai-widget">
                <div style="display:flex; gap:16px; align-items:center">
                    <div class="score-circle" id="aiScore" style="color:var(--ink-3)">?</div>
                    <div>
                        <div style="font-weight:700; font-size:14px; color:var(--primary)">AI Talent Match</div>
                        <p style="font-size:12px; color:var(--ink-3)" id="aiAdvice">Start writing your cover note to get your match score.</p>
                    </div>
                </div>
            </div>

            <div style="margin-bottom:24px">
                <label style="display:block; font-weight:700; font-size:13px; margin-bottom:8px">Cover Note *</label>
                <textarea id="coverNote" placeholder="Explain why you're a perfect fit..." style="width:100%; height:200px; padding:12px; border:1px solid var(--border); border-radius:8px; font-family:inherit; resize:none"></textarea>
                <div style="text-align:right; font-size:11px; color:var(--ink-3); margin-top:4px" id="charCount">0 / 2000</div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px">
                <div>
                    <label style="display:block; font-weight:700; font-size:13px; margin-bottom:8px">Proposed Rate (₹)</label>
                    <input type="number" id="propRate" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px">
                </div>
                <div>
                    <label style="display:block; font-weight:700; font-size:13px; margin-bottom:8px">Est. Timeline</label>
                    <select id="propTimeline" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px">
                        <option>3 days</option>
                        <option>1 week</option>
                        <option>2 weeks</option>
                        <option>1 month</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="drawer-footer">
            <button class="btn btn-outline" style="width:auto; padding:0 24px" id="saveDraft">Draft</button>
            <button class="btn btn-primary" id="submitApp">Send Application</button>
        </div>
    </div>

    <script type="module" src="/js/job-detail.js"></script>
</body>
</html>
