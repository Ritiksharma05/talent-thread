<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a New Job — Talent Thread</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #eff6ff;
            --surface: #ffffff;
            --surface-2: #f8fafc;
            --surface-3: #f1f5f9;
            --ink: #0f172a;
            --ink-2: #334155;
            --ink-3: #64748b;
            --border: #e2e8f0;
            --success: #059669;
            --success-bg: #ecfdf5;
            --radius: 12px;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--surface-2); color: var(--ink); line-height: 1.5; min-height: 100vh; }

        nav {
            height: 60px; background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 40px; position: sticky; top: 0; z-index: 100;
        }
        .nav-left { display: flex; align-items: center; gap: 8px; font-weight: 700; cursor: pointer; text-decoration: none; color: inherit; }
        .nav-left .tt { color: var(--primary); font-size: 20px; }

        .main-container { max-width: 1100px; margin: 60px auto; display: grid; grid-template-columns: 1fr 360px; gap: 60px; padding: 0 24px; }

        /* ══ FORM SIDE ══ */
        .form-card { background: var(--surface); padding: 48px; border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .form-header { margin-bottom: 40px; }
        .form-header h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
        .form-header p { color: var(--ink-3); font-size: 16px; }

        .step-nav { display: flex; align-items: center; gap: 16px; margin-top: 32px; }
        .step { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--surface-3); color: var(--ink-3); font-size: 14px; font-weight: 700; transition: 0.3s; }
        .step.active { background: var(--primary); color: white; transform: scale(1.1); }
        .step.done { background: var(--success); color: white; }
        .step-line { flex-grow: 1; height: 2px; background: var(--border); }
        .step-line.done { background: var(--success); }

        .form-group { margin-bottom: 32px; }
        .form-group label { display: block; font-size: 14px; font-weight: 700; color: var(--ink-2); margin-bottom: 10px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 14px; border: 1.5px solid var(--border); border-radius: 10px; outline: none; font-family: inherit; font-size: 15px; transition: 0.2s; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37,99,235,0.08); }
        .char-count { font-size: 12px; text-align: right; color: var(--ink-3); margin-top: 6px; font-weight: 500; }

        .radio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .radio-card { border: 2px solid var(--border); border-radius: 12px; padding: 20px; cursor: pointer; text-align: center; transition: 0.2s; }
        .radio-card:hover { border-color: var(--ink-3); }
        .radio-card.active { border-color: var(--primary); background: var(--primary-light); }
        .radio-card strong { display: block; font-size: 14px; margin-bottom: 4px; }

        .btn { padding: 14px 28px; border-radius: 10px; font-weight: 700; cursor: pointer; border: none; font-size: 15px; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-outline { background: white; border: 1.5px solid var(--border); color: var(--ink-2); }
        .btn-block { width: 100%; justify-content: center; }

        /* ══ PREVIEW SIDE ══ */
        .preview-sticky { position: sticky; top: 120px; }
        .preview-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; box-shadow: var(--shadow); }
        .preview-tag { font-size: 11px; font-weight: 800; color: var(--ink-3); letter-spacing: 0.1em; margin-bottom: 24px; display: block; }
        
        .p-card { border: 1.5px solid var(--border); border-radius: 12px; padding: 24px; background: var(--surface-2); }
        .p-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
        .p-price { font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 16px; }
        .p-desc { font-size: 13px; color: var(--ink-3); line-height: 1.5; }
        .p-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
        .p-chips span { font-size: 10px; font-weight: 700; background: white; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); }

        .toast-container { position: fixed; top: 24px; right: 24px; z-index: 1000; display: flex; flex-direction: column; gap: 12px; }
        .toast { padding: 16px 32px; background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); border-left: 5px solid var(--primary); font-weight: 600; font-size: 15px; }
        .toast-success { border-left-color: var(--success); }
    </style>
</head>
<body>

    <nav>
        <a href="/client-dashboard.html" class="nav-left">
            <span class="tt">TT</span>
            <span class="wordmark">TalentThread</span>
        </a>
        <div class="nav-right">
            <a href="/client-jobs.html" class="btn btn-outline" style="text-decoration:none">Cancel</a>
        </div>
    </nav>

    <div class="main-container">
        <main class="form-card">
            <div class="form-header" id="formHeader">
                <!-- Step Info -->
            </div>
            <div id="stepContent"></div>
        </main>

        <aside class="preview-sticky">
            <div class="preview-card">
                <span class="preview-tag">LIVE PREVIEW</span>
                <div id="livePreviewCard"></div>
            </div>
        </aside>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="/js/post-job.js"></script>
</body>
</html>
