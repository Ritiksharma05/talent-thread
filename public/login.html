<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Log in to Talent Thread — your AI-verified design portfolio and marketplace platform." />
  <title>Log In — Talent Thread</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/thread-ui.css" />
  <link rel="stylesheet" href="/css/auth-v2.css" />
</head>

<body>
  <div class="auth-page-wrap">
    <div class="auth-card-v2">

      <a href="/" class="auth-brand">
        <div class="nav-monogram">TT</div>
        <span class="auth-wordmark">Thread</span>
      </a>

      <h1 class="auth-heading">Welcome back</h1>
      <!-- loginMessage: shown by JS for status/errors/welcome -->
      <p class="auth-subhead" id="loginMessage">Log in to your Talent Thread account.</p>

      <!-- sessionActions: shown when already logged in -->
      <div id="sessionActions" class="hidden"
        style="display:flex; flex-direction:column; gap:10px; margin-bottom:16px;">
        <a href="/" id="primaryCta" class="btn btn-primary" style="justify-content:center;">Go to Dashboard</a>
        <button type="button" id="logoutButton" class="btn btn-secondary">Log Out</button>
      </div>

      <button type="button" id="googleLoginBtn" class="btn btn-secondary"
        style="width:100%; justify-content:center; margin-bottom: 24px;">
        <svg width="18" height="18" viewBox="0 0 24 24" style="margin-right: 8px;">
          <path fill="#4285F4"
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
          <path fill="#34A853"
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
          <path fill="#FBBC05"
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
          <path fill="#EA4335"
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
        </svg>
        Continue with Google
      </button>

      <div class="auth-divider" style="margin-bottom: 24px;">
        <span>or log in with email</span>
      </div>

      <form class="auth-form" id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email</label>
          <input type="email" id="loginEmail" name="email" class="form-input" placeholder="you@example.com"
            autocomplete="email" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="loginPassword">
            Password
            <a href="/reset-password.html" id="forgotPasswordLink"
              style="float:right; font-size:12px; color:var(--blue); font-weight:400;">Forgot password?</a>
          </label>
          <input type="password" id="loginPassword" name="password" class="form-input" placeholder="Your password"
            autocomplete="current-password" required />
        </div>

        <button type="submit" class="btn btn-primary" id="loginButton" style="width:100%; justify-content:center;">
          Sign In →
        </button>
      </form>

      <div class="auth-footer-links" style="margin-top: 20px; justify-content: center;">
        <span>Don't have an account? <a href="/signup.html">Sign up free →</a></span>
      </div>

    </div>
  </div>

  <script src="/js/tt-utils.js"></script>
  <script type="module" src="/js/shared.js"></script>
  <script type="module" src="/js/login.js"></script>
</body>

</html>
